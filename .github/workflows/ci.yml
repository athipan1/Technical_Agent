name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Git for HTTPS cloning
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf \
            https://github.com/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 httpx
          pip install -r requirements.txt

      - name: Import FastAPI app
        run: python -c "from app.main import app; print(app.title)"

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run unit and API tests
        run: pytest -q --tb=short --disable-warnings

      - name: Validate CLI output
        run: |
          python app/service.py AOT.BK --mock | python -c "import sys, json; data = json.load(sys.stdin); assert isinstance(data['trend'], str); assert isinstance(data['rsi'], (int, float)); assert isinstance(data['macd_line'], (int, float)); assert isinstance(data['macd_signal'], (int, float)); assert isinstance(data['signal'], str); assert isinstance(data['reasoning'], str)"
